<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Birthday Surprise 💌</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div class="badge">💖</div>
      <h1 class="title">Tap the envelope!</h1>
      <p class="subtitle">A tiny surprise inside ✨</p>
    </header>

    <button id="envelope" class="envelope" aria-label="Open envelope" aria-expanded="false">
      <div class="env-shadow"></div>

      <div class="env-back"></div>
      <div class="env-flap"></div>
      <div class="env-front"></div>
      <div class="env-heart" aria-hidden="true">❤</div>

      <article class="card" aria-hidden="true">
        <div class="card-top">
          <img class="photo" src="photo.jpeg" alt="Photo" />
        </div>
        <div class="card-bottom">
          <h2 class="card-title">Happy Birthday, Anusuya 💗! 🎉</h2>
          <p class="card-msg">
            Wishing you a day full of smiles, cozy moments, and sweet surprises.
            You’re amazing — today and always 💗
          </p>
          <p class="sig">— Baibhab</p>
          <button id="replay" class="replay" type="button">Replay ↺</button>
        </div>
      </article>
    </button>

    <p class="hint">Tip: Works best on mobile too — just tap 💌</p>
  </main>

  <canvas id="confetti" aria-hidden="true"></canvas>
  <script src="script.js"></script>
</body>
</html>
